name: Akasha Automation Plugin Publish
run-name: "Akasha Automation ${{ github.event.inputs.version || github.ref_name }}"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "插件版本（例如 0.3.1 或 0.4.0-alpha.1）"
        required: true
        type: string
      draft:
        description: "创建为 GitHub Release 草稿"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: "plugin-release-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      draft: ${{ steps.version.outputs.draft }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate tag/input against plugin.json
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
              $version = "${{ github.event.inputs.version }}"
              $draft = "${{ github.event.inputs.draft }}".ToLowerInvariant()
          }
          else {
              $version = "${{ github.ref_name }}".TrimStart("v")
              $draft = "false"
          }

          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$') {
              throw "版本号不符合语义化版本规范: $version"
          }

          $manifest = Get-Content "plugin/akasha-genshin-automation/plugin.json" -Raw | ConvertFrom-Json
          if ([string]$manifest.version -ne $version) {
              throw "发布版本 $version 与 plugin.json 版本 $($manifest.version) 不一致"
          }

          $prerelease = $version.Contains("-").ToString().ToLowerInvariant()
          "version=$version" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          "draft=$draft" >> $env:GITHUB_OUTPUT

  build:
    name: Test and package plugin
    runs-on: windows-latest
    needs: validate
    outputs:
      package_size: ${{ steps.assets.outputs.package_size }}
      package_sha256: ${{ steps.assets.outputs.package_sha256 }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Test, publish, and verify package
        shell: pwsh
        run: .\scripts\Publish-Plugin.ps1

      - name: Verify release assets
        id: assets
        shell: pwsh
        run: |
          $version = "${{ needs.validate.outputs.version }}"
          $archive = "artifacts/release/akasha-genshin-automation-v$version.zip"
          $checksum = "$archive.sha256"

          if (-not (Test-Path -LiteralPath $archive -PathType Leaf)) {
              throw "插件 ZIP 未生成: $archive"
          }
          if (-not (Test-Path -LiteralPath $checksum -PathType Leaf)) {
              throw "SHA-256 文件未生成: $checksum"
          }

          $expectedHash = ((Get-Content -LiteralPath $checksum -Raw) -split '\s+')[0]
          $actualHash = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($expectedHash -ne $actualHash) {
              throw "插件 ZIP 的 SHA-256 与校验文件不一致"
          }

          "package_size=$((Get-Item -LiteralPath $archive).Length)" >> $env:GITHUB_OUTPUT
          "package_sha256=$actualHash" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v6
        with:
          name: akasha-genshin-automation-v${{ needs.validate.outputs.version }}
          path: |
            artifacts/release/akasha-genshin-automation-v${{ needs.validate.outputs.version }}.zip
            artifacts/release/akasha-genshin-automation-v${{ needs.validate.outputs.version }}.zip.sha256
          if-no-files-found: error
          retention-days: 14

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: akasha-genshin-automation-v${{ needs.validate.outputs.version }}
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: Akasha Genshin Automation v${{ needs.validate.outputs.version }}
          draft: ${{ needs.validate.outputs.draft }}
          prerelease: ${{ needs.validate.outputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/akasha-genshin-automation-v${{ needs.validate.outputs.version }}.zip
            release/akasha-genshin-automation-v${{ needs.validate.outputs.version }}.zip.sha256

  create_cnb_release:
    name: Mirror source and create CNB Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - build
    permissions:
      contents: read
    env:
      CNB_PROJECT: AkashaNavigator/akasha-automation
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify CNB token is configured
        shell: bash
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          if [ -z "$CNB_TOKEN" ]; then
            echo "::error::GitHub repository secret CNB_TOKEN is not configured."
            exit 1
          fi

      - name: Mirror release commit to CNB
        shell: bash
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          CREDENTIAL_FILE="$RUNNER_TEMP/cnb-git-credentials"
          cleanup_credentials() {
            rm -f "$CREDENTIAL_FILE"
            git config --global --unset-all credential.helper || true
          }
          trap cleanup_credentials EXIT

          git config --global credential.helper "store --file=$CREDENTIAL_FILE"
          printf "protocol=https\nhost=cnb.cool\nusername=cnb\npassword=%s\n\n" "$CNB_TOKEN" |
            git credential approve

          git remote add cnb "https://cnb.cool/$CNB_PROJECT"
          git push cnb HEAD:refs/heads/main

          if [ "${{ github.event_name }}" = "push" ]; then
            git push cnb "refs/tags/${{ github.ref_name }}"
          fi

      - uses: actions/download-artifact@v7
        with:
          name: akasha-genshin-automation-v${{ needs.validate.outputs.version }}
          path: release

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install CNB publisher dependency
        run: python -m pip install --disable-pip-version-check "requests>=2.31.0,<3"

      - name: Create CNB Release and upload assets
        shell: bash
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          python .github/scripts/publish_cnb_release.py \
            --token "$CNB_TOKEN" \
            --project "$CNB_PROJECT" \
            --version "${{ needs.validate.outputs.version }}" \
            --assets release \
            --draft "${{ needs.validate.outputs.draft }}" \
            --prerelease "${{ needs.validate.outputs.prerelease }}"

  notify_navigator:
    name: Publish plugin metadata to AkashaNavigator notice
    runs-on: ubuntu-latest
    needs:
      - validate
      - build
      - create_release
      - create_cnb_release
    if: needs.validate.outputs.draft == 'false'
    steps:
      - name: Verify dispatch token is configured
        shell: bash
        env:
          DISPATCH_TOKEN: ${{ secrets.AKASHA_NAVIGATOR_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "::error::GitHub repository secret AKASHA_NAVIGATOR_DISPATCH_TOKEN is not configured."
            exit 1
          fi

      - name: Dispatch released package metadata
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.AKASHA_NAVIGATOR_DISPATCH_TOKEN }}
          script: |
            const version = '${{ needs.validate.outputs.version }}';
            await github.rest.repos.createDispatchEvent({
              owner: 'ColinXHL',
              repo: 'AkashaNavigator',
              event_type: 'automation_plugin_released',
              client_payload: {
                version,
                min_host_version: '${{ vars.AUTOMATION_MIN_HOST_VERSION || '1.4.0-alpha.2' }}',
                package_size: '${{ needs.build.outputs.package_size }}',
                package_sha256: '${{ needs.build.outputs.package_sha256 }}',
                github_url: `https://github.com/ColinXHL/akasha-automation/releases/download/v${version}/akasha-genshin-automation-v${version}.zip`,
                cnb_url: `https://cnb.cool/AkashaNavigator/akasha-automation/-/releases/download/v${version}/akasha-genshin-automation-v${version}.zip`
              }
            });
